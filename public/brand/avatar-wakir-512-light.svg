<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wakir Labs — Avatar (Phase 1, typografisches Wortmark)
  Spezifikation: substack-setup.md §4
  - 512 x 512, Off-White Hintergrund (#FAF7F0), schwarz (#1A1B1F)
  - Source Serif 4 Bold, kein Effekt, kein Verlauf
  - "Wakir" oben groß, "Labs" darunter halbe Größe
  Hinweis: Schriftname als Familie deklariert, mit serif-Fallback.
  Bei der PNG-Konvertierung wird die System-Schrift Source Serif 4
  vorausgesetzt (siehe README in diesem Ordner). Falls nicht
  installiert, nutzt der Renderer den nächsten verfügbaren Serif.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512" width="512" height="512"
     role="img" aria-label="Wakir Labs">
  <rect width="512" height="512" fill="#FAF7F0"/>
  <g font-family="'Source Serif 4', 'Source Serif Pro', 'Georgia', serif"
     fill="#1A1B1F" text-anchor="middle">
    <text x="256" y="270" font-size="116" font-weight="700"
          letter-spacing="0">Wakir</text>
    <text x="256" y="350" font-size="58" font-weight="600"
          letter-spacing="0">Labs</text>
  </g>
</svg>
